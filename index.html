<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BJ BAR 告知文ジェネレーター</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0a12">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">

    <meta name="description" content="高円寺の駄菓子BAR BJ BARの告知ツイートを自動生成します。">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff00ff;
            --secondary: #00ffff;
            --bg-dark: #0a0a12;
            --card-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #e0e0e0;
            --accent-yellow: #fff200;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(255, 0, 255, 0.15), transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(0, 255, 255, 0.15), transparent 40%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        .container { width: 100%; max-width: 600px; padding: 20px; z-index: 10; }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 4px;
            background: linear-gradient(90deg, transparent, var(--primary), var(--secondary), transparent);
            animation: flow 3s linear infinite;
        }

        @keyframes flow { 0% { left: -100%; } 100% { left: 100%; } }

        h1 {
            font-family: 'DotGothic16', sans-serif;
            font-size: 2rem;
            text-align: center;
            margin-bottom: 30px;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.9rem; margin-bottom: 8px; color: var(--secondary); font-weight: 700; }

        input, select, textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 12px 16px;
            color: white;
            font-family: inherit;
            font-size: 16px;
        }

        #aiSettings {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            display: none;
        }

        .generate-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 12px;
            padding: 16px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 12px;
            display: flex; justify-content: center; align-items: center; gap: 10px;
        }

        .generate-btn.ai-btn { background: linear-gradient(135deg, #4285F4, #34A853); }

        #resultText { height: 150px; resize: none; width: 100%; margin-top: 5px; }
        .count-badge { position: absolute; bottom: 10px; right: 15px; font-size: 0.8rem; color: #888; }
        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .action-btn { padding: 12px; border-radius: 10px; border: 1px solid var(--glass-border); background: rgba(255, 255, 255, 0.05); color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }

        .copy-success { position: fixed; top: 20px; right: 20px; background: var(--secondary); color: black; padding: 10px 20px; border-radius: 8px; font-weight: 700; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 100; }
        .copy-success.show { opacity: 1; }

        @media (max-width: 480px) {
            .container { padding: 10px; }
            .card { padding: 25px 15px; border-radius: 16px; }
            h1 { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>BJ BAR <span style="font-size: 0.7em;">TWEET GEN</span> <span style="font-size: 0.4em; opacity: 0.5;">v1.3</span></h1>
            
            <div class="input-group">
                <label for="dateInput">営業日</label>
                <input type="date" id="dateInput">
            </div>

            <div class="input-group">
                <label for="weatherSelect">雰囲気</label>
                <select id="weatherSelect">
                    <option value="random">サイコロにお任せ</option>
                    <option value="sunny">晴れ・穏やか</option>
                    <option value="rainy">雨・しっとり</option>
                    <option value="cold">寒い・温まりたい</option>
                    <option value="hot">暑い・ノド乾いた</option>
                    <option value="exciting">盛り上がり・賑やか</option>
                </select>
            </div>

            <div style="text-align: right; margin-bottom: 20px;">
                <button id="aiSettingsToggle" style="background: none; border: none; color: #888; cursor: pointer; text-decoration: underline; font-size: 0.8rem;">🤖 Gemini AI設定</button>
            </div>

            <div id="aiSettings">
                <div class="input-group">
                    <label>APIキー</label>
                    <input type="password" id="apiKeyInput" placeholder="AI APIキーを入力...">
                </div>
                <div class="input-group">
                    <label>使用モデル</label>
                    <select id="modelNameSelect">
                        <option value="gemini-2.5-flash">gemini-2.5-flash (最新・高速)</option>
                        <option value="gemini-2.5-pro">gemini-2.5-pro (最新・最高機能)</option>
                        <option value="gemini-1.5-flash">gemini-1.5-flash (安定版)</option>
                        <option value="gemini-1.0-pro">gemini-1.0-pro (旧版・404回避用)</option>
                    </select>
                </div>
                <button id="listModelsBtn" style="background: none; border: 1px solid #444; color: #888; font-size: 0.7rem; padding: 5px; border-radius: 4px; width: 100%; margin-bottom: 10px;">🔍 利用可能なモデルを確認</button>
            </div>

            <button class="generate-btn" id="generateBtn">✨ テンプレートで生成</button>
            <button class="generate-btn ai-btn" id="aiGenerateBtn" style="display: none;">🤖 Gemini AIで生成</button>

            <div class="result-area">
                <label>生成されたツイート</label>
                <textarea id="resultText" readonly placeholder="生成ボタンを押してください..."></textarea>
                <div class="count-badge" id="charCount">0 / 140</div>
            </div>

            <div class="actions">
                <button class="action-btn" id="copyBtn">📋 コピー</button>
                <button class="action-btn" id="tweetBtn">🐦 Xでシェア</button>
            </div>
        </div>
    </div>

    <div id="copyToast" class="copy-success">コピーしました！</div>

    <script type="importmap">
      { "imports": { "@google/generative-ai": "https://esm.run/@google/generative-ai" } }
    </script>
    <script type="module">
        import { GoogleGenerativeAI } from "@google/generative-ai";

        const elements = {
            dateInput: document.getElementById('dateInput'),
            generateBtn: document.getElementById('generateBtn'),
            aiGenerateBtn: document.getElementById('aiGenerateBtn'),
            resultText: document.getElementById('resultText'),
            charCount: document.getElementById('charCount'),
            copyBtn: document.getElementById('copyBtn'),
            tweetBtn: document.getElementById('tweetBtn'),
            weatherSelect: document.getElementById('weatherSelect'),
            aiSettingsToggle: document.getElementById('aiSettingsToggle'),
            aiSettings: document.getElementById('aiSettings'),
            apiKeyInput: document.getElementById('apiKeyInput'),
            modelSelect: document.getElementById('modelNameSelect'),
            listModelsBtn: document.getElementById('listModelsBtn')
        };

        // 初期設定
        const savedKey = localStorage.getItem('GEMINI_API_KEY');
        if (savedKey) {
            elements.apiKeyInput.value = savedKey;
            elements.aiGenerateBtn.style.display = 'block';
        }
        const savedModel = localStorage.getItem('GEMINI_MODEL');
        if (savedModel) {
            elements.modelSelect.value = savedModel;
        }

        // イベントリスナー
        elements.aiSettingsToggle.addEventListener('click', () => {
            elements.aiSettings.style.display = elements.aiSettings.style.display === 'none' ? 'block' : 'none';
        });

        elements.apiKeyInput.addEventListener('input', (e) => {
            const key = e.target.value.trim();
            localStorage.setItem('GEMINI_API_KEY', key);
            elements.aiGenerateBtn.style.display = key ? 'block' : 'none';
        });

        elements.modelSelect.addEventListener('change', (e) => {
            localStorage.setItem('GEMINI_MODEL', e.target.value);
        });

        elements.listModelsBtn.addEventListener('click', async () => {
            const key = elements.apiKeyInput.value.trim();
            if (!key) return alert('APIキーを入力してください');
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
                const data = await res.json();
                if (data.models) {
                    const names = data.models.map(m => m.name.replace('models/', ''));
                    alert("利用可能なモデル:\n" + names.join("\n"));
                } else {
                    alert("モデルが見つかりませんでした:\n" + JSON.stringify(data));
                }
            } catch (e) { alert("診断エラー: " + e.message); }
        });

        // URLハッシュからキーを読み込む
        if (window.location.hash.startsWith('#key=')) {
            const key = window.location.hash.replace('#key=', '');
            if (key) {
                elements.apiKeyInput.value = key;
                localStorage.setItem('GEMINI_API_KEY', key);
                elements.aiGenerateBtn.style.display = 'block';
                history.replaceState(null, null, window.location.pathname);
                alert('APIキーを自動設定しました！');
            }
        }

        function setNextSaturday() {
            const now = new Date();
            const day = now.getDay();
            let nextSat = new Date(now);
            if (day !== 6) nextSat.setDate(now.getDate() + (6 - day + 7) % 7);
            elements.dateInput.value = nextSat.toISOString().split('T')[0];
        }
        setNextSaturday();

        const templates = {
            sunny: ["爽やかな夜風が気持ちいいですね。高円寺散策のついでに、懐かしい駄菓子をツマミに一杯いかがですか？", "絶好の飲み日和！昭和レトロな空間で、童心に帰ってお喋りしましょう。"],
            rainy: ["雨音を聴きながら、しっぽり駄菓子飲み。足元お気をつけてお越しください。", "あいにくの雨ですが、店内はカラフルな駄菓子で賑やかです！"],
            cold: ["冷え込む夜ですね。温かいお酒と、懐かしい駄菓子で魂も温まりますよ。", "外は寒いですが、店内は暖かくしてお待ちしてます。"],
            hot: ["今日も暑かったですね！冷え冷えのドリンクと、酸っぱい駄菓子が染みる夜です。", "この暑さを吹き飛ばす、爽快な一杯と駄菓子をどうぞ。"],
            exciting: ["今夜は賑やかになりそうな予感！新しい駄菓子も入荷してます。ワイワイ盛り上がりましょう！", "高円寺の夜はこれから。エモいBGMと駄菓子で乾杯！"],
            calls: ["皆様のご来店を心よりお待ちしております！", "ふらっとお立ち寄りください。乾杯しましょう！", "今夜も元気に営業しています。"],
            seasonal: {"01": "新年の空気の中、", "02": "暦の上では春ですが、", "03": "春の訪れを感じる今宵、", "04": "新年度のスタートですね。", "05": "新緑の美しい季節、", "06": "梅雨の晴れ間の夜に、", "07": "夏本番の暑さですが、", "08": "夜風に秋の気配が混じる、", "09": "夕暮れが早くなってきました。", "10": "秋の夜長を楽しみましょう。", "11": "冬の足音が聞こえてきます。", "12": "一年の締めくくりに、"}
        };

        function templateGenerate() {
            const date = new Date(elements.dateInput.value);
            const mm = String(date.getMonth() + 1).padStart(2, '0');
            const dayNames = ["日", "月", "火", "水", "木", "金", "土"];
            const header = `【高円寺の駄菓子BAR BJ BAR ${date.getMonth()+1}月${date.getDate()}日（${dayNames[date.getDay()]}）も20:00 OPEN】\n\n`;
            
            let w = elements.weatherSelect.value;
            if (w === 'random') w = ["sunny","rainy","cold","hot","exciting"][Math.floor(Math.random()*5)];
            const body = templates[w][Math.floor(Math.random()*templates[w].length)];
            const call = templates.calls[Math.floor(Math.random()*templates.calls.length)];
            
            elements.resultText.value = `${header}${templates.seasonal[mm]||""}${body}\n\n${call}\n\nホシカワ`;
            updateCharCount();
        }

        async function aiGenerate() {
            const key = elements.apiKeyInput.value.trim();
            if (!key) return;
            elements.aiGenerateBtn.disabled = true;
            elements.aiGenerateBtn.innerText = '🤖 AIが思考中...';
            try {
                const date = new Date(elements.dateInput.value);
                const day = ["日", "月", "火", "水", "木", "金", "土"][date.getDay()];
                const genAI = new GoogleGenerativeAI(key);
                const model = genAI.getGenerativeModel({ model: elements.modelSelect.value || "gemini-2.5-flash" });
                const prompt = `高円寺の駄菓子BAR「BJ BAR」店主のツイート告知文を1つ作成せよ。
日付:${date.getMonth()+1}月${date.getDate()}日(${day}) 20:00開店
制約: 140文字以内、冒頭に【高円寺の駄菓子BAR BJ BAR ${date.getMonth()+1}月${date.getDate()}日（${day}）も20:00 OPEN】、末尾に「\n\nホシカワ」。本文のみ。`;
                const res = await model.generateContent(prompt);
                elements.resultText.value = res.response.text().trim();
            } catch (e) { elements.resultText.value = 'エラー：' + e.message; }
            finally {
                elements.aiGenerateBtn.disabled = false;
                elements.aiGenerateBtn.innerText = '🤖 Gemini AIで生成';
                updateCharCount();
            }
        }

        function updateCharCount() {
            const len = elements.resultText.value.length;
            elements.charCount.innerText = `${len} / 140`;
            elements.charCount.className = 'count-badge ' + (len > 140 ? 'error' : len > 120 ? 'warning' : '');
        }

        elements.generateBtn.addEventListener('click', templateGenerate);
        elements.aiGenerateBtn.addEventListener('click', aiGenerate);
        elements.copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(elements.resultText.value).then(() => {
                document.getElementById('copyToast').classList.add('show');
                setTimeout(() => document.getElementById('copyToast').classList.remove('show'), 2000);
            });
        });
        elements.tweetBtn.addEventListener('click', () => window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(elements.resultText.value)}`, '_blank'));
        templateGenerate();

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW error', err));
            });
        }
    </script>
</body>
</html>
